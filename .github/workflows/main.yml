name: Consolidated CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-latex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra lmodern
      - name: Compile Manifesto
        run: pdflatex manifesto.tex
        working-directory: docs-latex
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: manuscript-pdf
          path: docs-latex/manifesto.pdf

  build-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: pip install --no-cache-dir -r requirements.txt
        working-directory: ai-python
      - name: Run Python tests
        run: echo "No Python tests configured yet."
        working-directory: ai-python

  build-solidity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Hardhat
        run: npm install
        working-directory: blockchain-solidity
      - name: Compile Contracts
        run: npx hardhat compile
        working-directory: blockchain-solidity
      - name: Upload Solidity artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solidity-artifacts
          path: blockchain-solidity/artifacts/

  build-cpp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup C++ environment
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake
      - name: Configure project
        run: |
          mkdir -p build
          cd build
          cmake ..
        working-directory: stickler-protocol
      - name: Build project
        run: |
          cd build
          make
        working-directory: stickler-protocol
      - name: Verify C++ build
        run: |
          cd build
          echo "Built executables:"
          find . -maxdepth 1 -type f -executable | wc -l
          echo "Build verification complete."
        working-directory: stickler-protocol
      - name: Upload C++ build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpp-build
          path: stickler-protocol/build/

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [build-latex, build-python, build-solidity, build-cpp]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download LaTeX artifact
        uses: actions/download-artifact@v4
        with:
          name: manuscript-pdf
          path: ./manuscript-pdf

      - name: Download Solidity artifacts
        uses: actions/download-artifact@v4
        with:
          name: solidity-artifacts
          path: ./solidity-artifacts

      - name: Download C++ artifact
        uses: actions/download-artifact@v4
        with:
          name: cpp-build
          path: ./cpp-build

      # --- Dynamic Site Generation ---
      - name: Generate dynamic site
        env:
          LATEX_OUTCOME: ${{ needs.build-latex.result }}
          PYTHON_OUTCOME: ${{ needs.build-python.result }}
          SOLIDITY_OUTCOME: ${{ needs.build-solidity.result }}
          CPP_OUTCOME: ${{ needs.build-cpp.result }}
        run: |
          # Copy manifesto PDF for the site
          cp ./manuscript-pdf/manifesto.pdf ./manifesto.pdf 2>/dev/null || true

          # Generate the site
          python3 ./scripts/generate_site.py ./_site

          # Copy artifacts into the site for direct download
          cp ./manifesto.pdf ./_site/manifesto.pdf 2>/dev/null || true
          mkdir -p ./_site/artifacts
          cp -r ./solidity-artifacts ./_site/artifacts/solidity 2>/dev/null || true

          echo "=== Site contents ==="
          find ./_site -type f | head -30

      # --- Deploy to GitHub Pages ---
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # --- Create GitHub Release ---
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release ${{ github.run_number }}
          body: |
            ## Automated Release from Consolidated CI

            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}

            ### Build Results
            | Job | Status |
            |-----|--------|
            | build-latex | ${{ needs.build-latex.result }} |
            | build-python | ${{ needs.build-python.result }} |
            | build-solidity | ${{ needs.build-solidity.result }} |
            | build-cpp | ${{ needs.build-cpp.result }} |

            ### Artifacts
            - **manuscript.pdf** — Stickler Protocol Charter (LaTeX)
            - **cpp-build.tar.gz** — 14 compiled C++ executables
            - **solidity-artifacts.tar.gz** — Compiled Solidity contracts & ABI

            ---
            *Stickler Protocol — Eternal, Cabal, Inscribed.*
          draft: false
          prerelease: false
          files: |
            ./manuscript-pdf/manifesto.pdf
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
