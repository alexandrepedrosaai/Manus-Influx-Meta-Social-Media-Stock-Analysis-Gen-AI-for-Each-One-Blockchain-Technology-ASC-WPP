name: ImmutableOS Build & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Linux binary
        run: make build
        env:
          GOOS: linux
          GOARCH: amd64

      - name: Generate SBOM
        run: bash ./scripts/generate-sbom.sh > sbom-linux.json
        env:
          GOOS: linux

      - name: Generate Attention
        run: bash ./scripts/generate-attention.sh > attention-linux.json
        env:
          GOOS: linux

      - name: Generate Immutable manifest
        run: bash ./scripts/generate-immutable.sh > immutable-linux.json
        env:
          GOOS: linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            build/linux/bin/*
            sbom-linux.json
            attention-linux.json
            immutable-linux.json

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Enable long paths on Windows
        shell: pwsh
        run: |
          git config --system core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Windows binary
        shell: bash
        run: |
          mkdir -p build/windows/bin
          GOOS=windows GOARCH=amd64 go build -o build/windows/bin/app.exe main.go

      - name: Generate SBOM
        shell: bash
        run: |
          GOOS=windows bash ./scripts/generate-sbom.sh > sbom-windows.json

      - name: Generate Attention
        shell: bash
        run: |
          GOOS=windows bash ./scripts/generate-attention.sh > attention-windows.json

      - name: Generate Immutable manifest
        shell: bash
        run: |
          GOOS=windows bash ./scripts/generate-immutable.sh > immutable-windows.json

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            build/windows/bin/*
            sbom-windows.json
            attention-windows.json
            immutable-windows.json

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build macOS binary
        run: make build
        env:
          GOOS: darwin
          GOARCH: amd64

      - name: Generate SBOM
        run: bash ./scripts/generate-sbom.sh > sbom-darwin.json
        env:
          GOOS: darwin

      - name: Generate Attention
        run: bash ./scripts/generate-attention.sh > attention-darwin.json
        env:
          GOOS: darwin

      - name: Generate Immutable manifest
        run: bash ./scripts/generate-immutable.sh > immutable-darwin.json
        env:
          GOOS: darwin

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            build/darwin/bin/*
            sbom-darwin.json
            attention-darwin.json
            immutable-darwin.json

  release:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Package artifacts
        run: |
          cd artifacts
          # Package Linux
          tar czf ../immutableos-linux-${{ github.run_number }}.tar.gz -C linux-artifacts .
          # Package Windows
          tar czf ../immutableos-windows-${{ github.run_number }}.tar.gz -C windows-artifacts .
          # Package macOS
          tar czf ../immutableos-macos-${{ github.run_number }}.tar.gz -C macos-artifacts .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: immutableos-v${{ github.run_number }}
          name: "ImmutableOS Build ${{ github.run_number }}"
          body: |
            ## ImmutableOS Build ${{ github.run_number }}

            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}

            ### Platform Binaries
            | Platform | Binary | Status |
            |----------|--------|--------|
            | Linux x64 | `app` | ${{ needs.build-linux.result }} |
            | Windows x64 | `app.exe` | ${{ needs.build-windows.result }} |
            | macOS x64 | `app` | ${{ needs.build-macos.result }} |

            ### Included Manifests
            - **SBOM** — Software Bill of Materials
            - **Attention** — Audit metadata
            - **Immutable** — SHA256 integrity manifest

            ---
            *ImmutableOS — Stickler Protocol*
          draft: false
          prerelease: false
          files: |
            immutableos-linux-${{ github.run_number }}.tar.gz
            immutableos-windows-${{ github.run_number }}.tar.gz
            immutableos-macos-${{ github.run_number }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos, release]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Generate dynamic site
        env:
          LINUX_OUTCOME: ${{ needs.build-linux.result }}
          WINDOWS_OUTCOME: ${{ needs.build-windows.result }}
          MACOS_OUTCOME: ${{ needs.build-macos.result }}
          RELEASE_OUTCOME: ${{ needs.release.result }}
        run: |
          python3 ./scripts/generate_immutableos_site.py ./_site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
