name: ImmutableOS Build & Release

on:
  push:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/upload-artifact@v4
      - run: make
      - run: ./scripts/generate-sbom.sh > sbom-linux.json
      - run: ./scripts/generate-attention.sh > attention-linux.json
      - run: ./scripts/generate-immutable.sh > immutable-linux.json
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            build/linux/bin/*
            sbom-linux.json
            attention-linux.json
            immutable-linux.json

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - run: msbuild project.sln
      - run: ./scripts/generate-sbom.sh > sbom-windows.json
      - run: ./scripts/generate-attention.sh > attention-windows.json
      - run: ./scripts/generate-immutable.sh > immutable-windows.json
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            build/windows/bin/*
            sbom-windows.json
            attention-windows.json
            immutable-windows.json

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/upload-artifact@v4
      - run: make
      - run: ./scripts/generate-sbom.sh > sbom-macos.json
      - run: ./scripts/generate-attention.sh > attention-macos.json
      - run: ./scripts/generate-immutable.sh > immutable-macos.json
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            build/macos/bin/*
            sbom-macos.json
            attention-macos.json
            immutable-macos.json

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    steps:
      - uses: actions/checkout@v3
      - name: Download all artifacts
        uses: actions/upload-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: v${{ github.run_number }}
          release_name: "ImmutableOS Build ${{ github.run_number }}"

      # Upload Linux
      - name: Upload Linux binary
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/linux-artifacts/build/linux/bin/*
          asset_name: cpp-linux-${{ github.run_number }}.zip
          asset_content_type: application/zip
      - name: Upload Linux docs
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/linux-artifacts/sbom-linux.json
          asset_name: sbom-linux-${{ github.run_number }}.json
          asset_content_type: application/json
      - name: Upload Linux attention
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/linux-artifacts/attention-linux.json
          asset_name: attention-linux-${{ github.run_number }}.json
          asset_content_type: application/json
      - name: Upload Linux immutable
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/linux-artifacts/immutable-linux.json
          asset_name: immutable-linux-${{ github.run_number }}.json
          asset_content_type: application/json

      # Upload Windows
      - name: Upload Windows binary
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/windows-artifacts/build/windows/bin/*
          asset_name: cpp-windows-${{ github.run_number }}.zip
          asset_content_type: application/zip
      - name: Upload Windows docs
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/windows-artifacts/sbom-windows.json
          asset_name: sbom-windows-${{ github.run_number }}.json
          asset_content_type: application/json
      - name: Upload Windows attention
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/windows-artifacts/attention-windows.json
          asset_name: attention-windows-${{ github.run_number }}.json
          asset_content_type: application/json
      - name: Upload Windows immutable
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/windows-artifacts/immutable-windows.json
          asset_name: immutable-windows-${{ github.run_number }}.json
          asset_content_type: application/json

      # Upload macOS
      - name: Upload macOS binary
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/macos-artifacts/build/macos/bin/*
          asset_name: cpp-macos-${{ github.run_number }}.zip
          asset_content_type: application/zip
      - name: Upload macOS docs
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/macos-artifacts/sbom-macos.json
          asset_name: sbom-macos-${{ github.run_number }}.json
          asset_content_type: application/json
      - name: Upload macOS attention
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/macos-artifacts/attention-macos.json
          asset_name: attention-macos-${{ github.run_number }}.json
          asset_content_type: application/json
      - name: Upload macOS immutable
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/macos-artifacts/immutable-macos.json
          asset_name: immutable-macos-${{ github.run_number }}.json
          asset_content_type: application/json
