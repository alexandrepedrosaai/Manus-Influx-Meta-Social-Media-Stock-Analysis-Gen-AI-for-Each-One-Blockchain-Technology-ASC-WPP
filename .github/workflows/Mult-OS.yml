name: ImmutableOS Build & Release

on:
  push:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make
      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: cpp-linux
          path: build/linux/bin/*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: msbuild project.sln
      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: cpp-windows
          path: build/windows/bin/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: make
      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: cpp-macos
          path: build/macos/bin/*

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Generate SBOM
        run: ./scripts/generate-sbom.sh

      - name: Generate attention.json
        run: ./scripts/generate-attention.sh

      - name: Generate immutable.json
        run: ./scripts/generate-immutable.sh

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: v${{ github.run_number }}
          release_name: "ImmutableOS Build ${{ github.run_number }}"

      - name: Upload Linux binary
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/cpp-linux/*
          asset_name: cpp-linux-${{ github.run_number }}.zip
          asset_content_type: application/zip

      - name: Upload Windows binary
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/cpp-windows/*
          asset_name: cpp-windows-${{ github.run_number }}.zip
          asset_content_type: application/zip

      - name: Upload macOS binary
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/cpp-macos/*
          asset_name: cpp-macos-${{ github.run_number }}.zip
          asset_content_type: application/zip

      - name: Upload SBOM
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./sbom.json
          asset_name: sbom-${{ github.run_number }}.json
          asset_content_type: application/json

      - name: Upload attention.json
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./attention.json
          asset_name: attention-${{ github.run_number }}.json
          asset_content_type: application/json

      - name: Upload immutable.json
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./immutable.json
          asset_name: immutable-${{ github.run_number }}.json
          asset_content_type: application/json
