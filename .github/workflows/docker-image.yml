name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Dockerfile
        id: check
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No Dockerfile found, creating minimal Go builder."
          fi

      - name: Create Dockerfile if missing
        if: steps.check.outputs.exists == 'false'
        run: |
          cat > Dockerfile <<'EOF'
          FROM golang:1.21-alpine AS builder
          WORKDIR /app
          COPY go.mod main.go ./
          RUN go build -o /app/bin/app main.go
          FROM alpine:latest
          COPY --from=builder /app/bin/app /usr/local/bin/app
          ENTRYPOINT ["app"]
          EOF

      - name: Build the Docker image
        run: docker build . --file Dockerfile --tag immutable-os:${{ github.run_number }}

      - name: Tag Docker image
        run: |
          docker tag immutable-os:${{ github.run_number }} immutable-os:latest
          echo "Docker image built and tagged successfully."
